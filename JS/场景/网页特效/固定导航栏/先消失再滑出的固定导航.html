<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>先消失再滑出的固定导航栏</title>
</head>
<style>
    .nav {
        position: fixed;
        top: -100px;
        width: 100%;
        height: 100px;
        background-color: #243e92;
        transition: all 0.5s ease-in-out;
    }

    .main {
        margin: 0 auto;
        width: 80%;
        height: 2000px;
        border: 5px dotted #000;


    }

    .box {
        margin-top: 400px;
        width: 300px;
        height: 300px;
        background-color: #b62020;
    }
</style>

<body>
    <div class="nav"></div>
    <div class="main">
        <div class="box"></div>

    </div>


</body>
<script>
    const box = document.querySelector('.box');
    let nav = document.querySelector('.nav');
    window.addEventListener('scroll', function () {
        nav.style.top = window.scrollY >= box.offsetTop ? '0' : '-100px';
    })
</script>

</html>
