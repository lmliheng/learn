<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模态框</title>

</head>
<style>
    * {
        margin: 0;
        padding: 0;
        font-family: 'noto sans sc';
        font-size: 16px;
    }

    a {
        text-decoration: none;
    }

    .modal-box {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);

        width: 400px;
        height: 200px;
        border: 3px solid #adacac;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        justify-items: center;
        align-items: center;
        grid-gap: 20px;
        z-index: 999;
    }

    .modal-box .model-box-header {
        width: 100%;
        height: 50px;
        line-height: 50px;
        text-align: left;
        font-size: 20px;
        font-weight: bold;
        padding-left: 20px;
    }

    .modal-box .model-box-body {
        width: 100%;
        height: 60px;
        line-height: 60px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
    }

    .modal-box .close-btn {
        width: 100px;
        height: 40px;
        line-height: 40px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        padding: 0 20px;
        border: 1px solid #000;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease-in-out;
    }
</style>

<body>
    <button class="test-btn">提交</button>
    <!-- <div class="modal-box">
        <div class="model-box-header">成功</div>
        <div class="model-box-body">提交成功</div>
        <button class="close-btn">收到</button>
        <div class="close-icon"></div>
    </div> -->
</body>


<script>



    function ModalBox(title, body) {
        this.title = title;
        this.body = body;
        this.box = document.createElement('div');
        this.box.classList.add('modal-box');
        this.box.innerHTML = `
            <div class="model-box-header">${title}</div>
            <div class="model-box-body">${body}</div>
            <button class="close-btn">收到</button>
            <div class="close-icon"></div>
          `;
        //   console.log(this.box);
    }
    // ModalBox.prototype = {
    //     constructor: ModalBox,
    //     open() {
    //         document.body.appendChild(this.box);
    //         // 绑定点击事件
    //         this.box.querySelector('.close-btn').addEventListener('click', function () {
    //             console.log('点击了关闭按钮');
    //             this.close();
    //         })
    //     }
    //     ,
    //     close() {
    //         this.box.remove();
    //     }

    // }

    ModalBox.prototype.open = function () {
        document.body.appendChild(this.box);
        // 绑定点击事件
        this.box.querySelector('.close-btn').addEventListener('click', () => {
            console.log('点击了关闭按钮');
            console.log(this);// 不是箭头函数就指向按钮元素，换成箭头函数指向实例对象modelBox
            this.close();
        })
    }

    ModalBox.prototype.close = function () {
        this.box.remove();
    }

    document.querySelector('.test-btn').addEventListener('click', () => {
        let modalBox = new ModalBox('成功', '提交成功');
        modalBox.open();
    })

</script>

</script>

</html>
