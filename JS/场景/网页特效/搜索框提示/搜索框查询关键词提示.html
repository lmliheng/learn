<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索框查询关键词提示</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .search-box {
        position: relative;
        box-sizing: border-box;
        width: 800px;
        height: 60px;
        margin: 100px auto;
    }

    input {

        display: block;
        width: 800px;
        height: 60px;
        box-sizing: border-box;

        border-radius: 5px;
        padding-left: 10px;
        font-size: 20px;
        color: #999;
    }

    .down-tip {
        position: absolute;
        /* top: 62px; */
        left: 0px;
        width: 800px;
        height: 200px;
        background-color: #fff;
        border-radius: 5px;
        box-sizing: border-box;
        z-index: 3;
    }

    .down-tip ul li {
        box-sizing: border-box;
        list-style: none;
        border: 1px solid #ccc;
        height: 40px;
        line-height: 40px;
        padding-left: 10px;
        font-size: 20px;
        color: #333;
        cursor: pointer;
    }

    .down-tip ul li:hover {
        background-color: #f5f5f5;
    }
</style>

<body>
    <div class="search-box">
        <input type="text" placeholder="请输入搜索内容" id="search-input">
        <!-- 
        <div class="down-tip">
            <ul>
                <li>荣耀90</li>
                <li>红米系列</li>
                <li>小米13</li>
                <li>华为Mate40</li>
            </ul>
        </div> 
        -->


    </div>
</body>
<script>
    let tipData = [
        {
            id: 0,
            name: '荣耀90',
            href: '/'
        },
        {
            id: 1,
            name: '红米系列',
            href: '/'
        },
        {
            id: 2,
            name: '小米13',
            href: '/'
        },
        {
            id: 3,
            name: '华为Mate40',
            href: '/'
        }
    ]

    const input = document.querySelector('.search-box input');
    const searchBox = document.querySelector('.search-box');
    input.addEventListener('focus', function () {
        this.placeholder = '';
        let downTip = document.createElement('div');
        downTip.classList.add('down-tip');
        downTip.innerHTML = `
            <ul>
                <li>荣耀90</li>
                <li>红米系列</li>
                <li>小米13</li>
                <li>华为Mate40</li>
            </ul>
        `;

        searchBox.appendChild(downTip);

    })
    input.addEventListener('blur', function () {
        this.placeholder = '请输入搜索内容';
        let downTip = document.querySelector('.down-tip');
        downTip.remove();//删除元素,但是不会删除元素的内存
        console.log(downTip);
        downTip = null;
        console.log('使用downTip后的downTip值', downTip);
    })

    input.addEventListener('keydown', function (e) {
        console.log(e.type);// keydown
        console.log(e.key);

        if (e.key === 'Enter') {
            input.blur();// 模拟提交
        }// e.code类型为 string
    })


</script>

</html>
