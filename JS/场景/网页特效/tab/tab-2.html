<!-- 利用display属性实现tab切换 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tab切换</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    a {
        text-decoration: none;
    }

    li {
        list-style: none;
    }

    .tab-comtainer {
        box-sizing: border-box;
        width: 800px;
        height: 500px;
        margin: 100px auto;
        border: 1px solid #d46f6f;
    }

    .tab-header {
        box-sizing: border-box;
        display: flex;
        justify-content: right;
        align-items: center;
        gap: 20px;
        width: 800px;
        height: 100px;
        line-height: 100px;
        text-align: center;
        border-bottom: 1px solid #d46f6f;
    }

    .tab-item {

        width: 100px;
        height: 50px;
        line-height: 50px;
        text-align: center;
        border: 1px solid #d46f6f;
        border-radius: 5px;

        cursor: pointer;
        font-size: 20px;
        transition: all 0.5s ease-in-out;
    }



    .tab-item:last-child {
        margin-right: 30px;
    }

    .tab-header .active {
        background-color: #b62020;
        color: #fff;
    }


    .tab-item:hover {
        background-color: #b62020;
        color: #fff;
    }

    .tab-content {
        width: 800px;
        height: 400px;

    }

    .tab-content-item {

        display: none;
    }

    .tab-content .active {
        display: block;
    }

    .tab-content-item img {
        box-sizing: border-box;
        width: 800px;
        height: 400px;
        object-fit: cover;
    }
</style>

<body>
    <div class="tab-comtainer">
        <div class="tab-header">

            <div class="tab-item active" data-index="0">tab1</div>
            <div class="tab-item" data-index="1">tab2</div>
            <div class="tab-item" data-index="2">tab3</div>

        </div>

        <div class="tab-content">
            <div class="tab-content-item active">
                <img src="./img/1.png" alt="">
            </div>
            <div class="tab-content-item">
                <img src="./img/2.png" alt="">
            </div>
            <div class="tab-content-item">
                <img src="./img/3.png" alt="">
            </div>
        </div>


    </div>
</body>
<script>
    const tabItems = document.querySelectorAll('.tab-item');
    const tabContentItems = document.querySelectorAll('.tab-content-item');
    for (let i = 0; i < tabItems.length; i++) {
        tabItems[i].addEventListener('mouseenter', function () {
            for (let j = 0; j < tabItems.length; j++) {
                tabItems[j].classList.remove('active');
                tabContentItems[j].classList.remove('active');
            }
            this.classList.add('active');
            tabContentItems[i].classList.add('active');
        })
    }
</script>

</html>
