<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tab</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }


    .tab-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 20px;

        margin: 100px auto;
        width: 600px;
        height: 500px;
        border: 4px dotted #b13636;
    }

    .tab-container button {
        margin-top: 20px;
        width: 100px;
        height: 40px;
        background-color: #fcfcfc;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        box-shadow: 5px 5px 5px 0px #ccc;
        transition: all 0.3s ease-in-out;
        font-size: 16px;
        font-weight: bold;
    }

    .tab-container .active {
        background-color: #b62020;
        color: #fff;
    }

    .tab-container button:hover {
        background-color: #e25151;
        /* box-shadow: 0 0 10px #e25151; */
        transform: translateY(-5px);
        color: #fff;
    }
</style>

<body>
    <div class="tab-container">
        <button class="active">tab1</button>
        <button>tab2</button>
        <button>tab3</button>
        <button>tab4</button>
        <button>tab5</button>

    </div>

</body>

</script>

</html>
