<!DOCTYPE html>
<html lang="en">
<!-- 可以用change事件，但是change事件是提交表单时触发的，不是输入时触发的，所以用input事件更好 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表单实时验证</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    h1 {
        margin: 80px 0;
        text-align: center;
    }

    .container {
        margin: 200px auto;
        width: 800px;
        height: 400px;
        border: 1px solid #000;
        text-align: center;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    input {
        margin: 20px 0;
        display: block;

        width: 300px;
        height: 30px;

        padding: 0 10px;
    }

    button {
        margin: 20px 0;
        width: 100px;
        height: 30px;
        border-radius: 5px;
    }

    .container p {

        position: absolute;
        top: 0px;
        left: 0px;
        font-size: 12px;
    }

    .p-none {
        display: none;

    }

    .p-red {
        display: block;
        color: red;
    }

    .p-green {
        display: block;
        color: green;
    }
</style>

<body>
    <h1>表单实时验证</h1>
    <div class="container">
        <input type="text" placeholder="请输入用户名" id="username" autocomplete="off">
        <button>提交</button>
        <p class="p-none"></p>
    </div>
</body>
<script>
    let container = document.querySelector('.container');

    container.children[2].style.top = container.children[0].offsetTop + container.children[0].offsetHeight + 'px';
    container.children[2].style.left = container.children[0].offsetLeft + 'px';

    container.children[0].addEventListener('input', function (e) {

        let reg = /^[a-zA-Z0-9_]{6,12}$/;
        // e.target.value 输入的用户名
        if (reg.test(e.target.value)) {
            console.log('用户名格式正确');
            container.children[2].textContent = '格式正确';
            container.children[2].classList.remove('p-none');
            container.children[2].classList.remove('p-red');
            container.children[2].classList.add('p-green');

        } else {
            console.log('用户名格式错误');
            container.children[2].textContent = '请输入6-12位字母、数字或下划线';
            container.children[2].classList.remove('p-none');
            container.children[2].classList.add('p-red');
            container.children[2].classList.remove('p-green');
        }
    })

    container.children[1].addEventListener('click', function (e) {
        let reg = /^[a-zA-Z0-9_]{6,12}$/;
        let username = container.children[0].value;
        reg.test(username) ? Swal.fire({
            title: '成功',
            text: '用户名格式正确',
            icon: 'success'
        }) : Swal.fire({
            title: '错误',
            text: '用户名格式错误，请输入6-12位字母、数字或下划线',
            icon: 'error'
        });


    })
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</html>
