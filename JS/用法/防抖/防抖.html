<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防抖debounce</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<style>
    .container {
        width: 800px;
        margin: 100px auto;
        height: 400px;
        border: 1px solid #000;
        text-align: center;
        font-size: 30px;
        line-height: 300px;
    }
</style>

<body>

    <div class="container">
        11

    </div>


</body>


<script>
    // error
    let i = 0;
    const container = document.querySelector('.container');
    mouseMove = () => {
        console.log('鼠标移动');
        container.innerHTML = i++;
    }

    container.addEventListener('mousemove', debounce(mouseMove, 3000))
    // 防抖函数
    function debounce_1(fn, delay) {  // 简单
        return function () {
            let timer;
            if (timer) {
                clearTimeout(timer);
            }
            setTimeout(() => { fn(); }, delay);
        }
    }
    // 防抖函数
    function debounce_2(fn, delay) { // 传参
        return function (...args) {
            let timer;
            const context = this;
            if (timer) {
                clearTimeout(timer);
            }
            setTimeout(() => {
                // fn.apply(context, ...args);
                fn.bind(context, ...args)();
                fn(...args);
            }, delay);
        }
    }

 


</script>

</script>

</html>
