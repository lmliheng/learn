<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>location</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    h1 {
        margin: 20px auto;
        text-align: center;
    }

    .container {
        margin: 20px auto;
        width: 500px;
        height: 400px;
        border: 1px solid #000;
        text-align: center;
        line-height: 100px;
    }
</style>

<body>
    <h1>location</h1>
    <!-- <a href="https://www.baidu.com">跳转</a> -->
    <div class="container">
        <p></p>
    </div>

</body>
<script>

    // 检测 userAgent(浏览器信息) error
    !(function () {
        const userAgent = navigator.userAgent// 验证是否为Android或iPhone
        const android = userAgent.match(/(Android);?[\s\/]+([\d.]+)?/)
        const iphone = userAgent.match(/(iPhone\sOs)\s([\d_]+)/)//如果是Android或iPhone，则跳转至移动站点
        console.log(android);
        console.log(iphone);
        if (android || iphone) {
            location.href = 'http://m.itcast.cn'
        }
    })()



    const p = document.querySelector('p');
    p.innerHTML = navigator.userAgent;
    console.log(typeof navigator.userAgent);
    // console.log(navigator.userAgent);
    // console.log(navigator.online);


</script>

</html>
