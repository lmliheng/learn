<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 问答助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 80vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .chat-header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #667eea;
            color: white;
        }

        .message.ai .message-avatar {
            background: #10b981;
            color: white;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: #f3f4f6;
            color: #1f2937;
            border-bottom-left-radius: 4px;
        }

        .message.ai .message-content.typing::after {
            content: '|';
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            50% {
                opacity: 1;
            }

            51%,
            100% {
                opacity: 0;
            }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f3f4f6;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0.6);
            }

            40% {
                transform: scale(1);
            }
        }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            resize: none;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.02);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-btn {
            padding: 12px 16px;
            background: #f3f4f6;
            color: #6b7280;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #e5e7eb;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 AI 问答助手</h1>
            <p>基于腾讯元器智能对话</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <p>开始问我问题吧</p>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="输入你的问题..." autocomplete="off">
            <button class="send-btn" id="sendBtn">发送</button>
            <button class="clear-btn" id="clearBtn">清空</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://yuanqi.tencent.com/openapi/v1/agent/chat/completions';
        const ASSISTANT_ID = '203570718182837324';
        const AUTH_TOKEN = 'YRsdNKlaJJU5YibO0OGbYzKWwaklOKSn';

        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const emptyState = document.getElementById('emptyState');

        let isLoading = false;

        // 添加消息到聊天区域
        function addMessage(content, role) {
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'user' ? '👤' : '🤖';

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content ${role === 'ai' ? 'typing' : ''}"></div>
            `;

            chatMessages.appendChild(messageDiv);

            if (role === 'ai') {
                // AI 消息，逐字输出
                const contentDiv = messageDiv.querySelector('.message-content');
                let index = 0;

                const typeInterval = setInterval(() => {
                    if (index < content.length) {
                        contentDiv.textContent += content[index];
                        index++;
                    } else {
                        clearInterval(typeInterval);
                        contentDiv.classList.remove('typing');
                    }
                }, 30);
            } else {
                messageDiv.querySelector('.message-content').textContent = content;
            }

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 显示加载动画
        function showTyping() {
            if (emptyState) {
                emptyState.remove();
            }

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 移除加载动画
        function removeTyping() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        // 发送消息
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || isLoading) return;

            // 添加用户消息
            addMessage(message, 'user');
            chatInput.value = '';

            // 显示加载状态
            isLoading = true;
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': AUTH_TOKEN
                    },
                    body: JSON.stringify({
                        assistant_id: ASSISTANT_ID,
                        user_id: 'user_' + Date.now(),
                        stream: true,
                        messages: [
                            {
                                role: 'user',
                                content: [{ type: 'text', text: message }]
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                removeTyping();

                // 处理流式响应
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                let firstChunk = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;

                            try {
                                const parsed = JSON.parse(data);
                                const content = parsed.choices?.[0]?.delta?.content || '';
                                if (content) {
                                    if (firstChunk) {
                                        firstChunk = false;
                                        // 直接添加 AI 消息
                                        const messageDiv = document.createElement('div');
                                        messageDiv.className = 'message ai';
                                        messageDiv.innerHTML = `
                                            <div class="message-avatar">🤖</div>
                                            <div class="message-content"></div>
                                        `;
                                        chatMessages.appendChild(messageDiv);
                                    }

                                    const lastMessage = chatMessages.querySelector('.message.ai:last-child .message-content');
                                    if (lastMessage) {
                                        lastMessage.textContent += content;
                                        chatMessages.scrollTop = chatMessages.scrollHeight;
                                    }
                                    fullContent += content;
                                }
                            } catch (e) {
                                console.log('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                removeTyping();
                addMessage('抱歉，我遇到了一些问题。请稍后重试。\n错误信息：' + error.message, 'ai');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        // 清空聊天记录
        function clearChat() {
            chatMessages.innerHTML = `
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <p>开始问我问题吧</p>
                </div>
            `;
        }

        // 事件监听
        sendBtn.addEventListener('click', sendMessage);

        clearBtn.addEventListener('click', clearChat);

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 页面加载完成后聚焦输入框
        window.addEventListener('load', () => {
            chatInput.focus();
        });
    </script>
</body>

</html>
