<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冒泡和捕获</title>
</head>
<style>
    .father {
        margin: 200px auto;
        width: 500px;
        height: 400px;
        background-color: #243e92;
    }

    .son {
        width: 200px;
        height: 300px;
        background-color: #b62020;
    }
</style>

<body>
    <div class="father">
        <div class="son"></div>

    </div>
</body>
<script>
    // 冒泡
    let father = document.querySelector('.father');
    let son = document.querySelector('.son');
    // window.addEventListener('click', function () {
    //     console.log('点击了窗口');
    // })
    // father.addEventListener('click', function () {
    //     console.log('点击了父元素');
    // })
    // son.addEventListener('click', function () {
    //     console.log('点击了子元素');
    // })
    // 捕获
    window.addEventListener('click', function () {
        console.log('点击了窗口');
    }, true)
    father.addEventListener('click', function () {
        console.log('点击了父元素');
    }, true)
    son.addEventListener('click', function () {
        console.log('点击了子元素');
    }, true)
</script>

</html>
