<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市布局查询</title>
    <link rel="stylesheet" href="lib/bootstrap.min.css">
    <script src="lib/bootstrap.min.js"></script>
    <script src="lib/axios.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    li {
        list-style: none;
    }

    .container {
        width: 800px;

        /* border: 1px solid #000; */
        margin: 50px auto;
    }

    .container .header {
        width: 100%;
        height: 50px;
        line-height: 50px;
        text-align: center;
        font-size: 16px;
        font-weight: bold;
        color: #000;
        background-color: #fff;
    }

    .container .input_container {
        margin: 0 auto;
        width: 600px;
        height: 300px;

    }

    .container .input_container form {
        display: block;
        margin: 0 auto;
    }

    .result_container {
        margin: 0 auto;
        width: 600px;

    }

    .result_container ul {
        display: block;
        padding: 0;
        /* border: 1px solid #000; */
        border-radius: 5px;
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3);
        overflow: auto;
        margin-bottom: 100px;
    }

    .result_container ul li {
        box-sizing: border-box;
        display: block;
        width: 100%;
        height: 40px;
        line-height: 40px;
        font-size: 20px;

        color: #000;
        padding: 0 10px;
        border-bottom: 1px solid #000;
        cursor: pointer;
        transition: all 0.3s ease-in-out;

    }

    .result_container ul li:hover {
        background-color: #0d6efd;
        color: #fff;
    }
</style>

<body>

    <div class="container">
        <div class="header">
            <h1>城市布局查询</h1>
        </div>
        <div class="input_container">
            <form>
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label fs-3">省份名称</label>
                    <input type="text" class="form-control" id="province_name" aria-describedby="emailHelp"
                        placeholder="请输入省份名称" autocomplete="off" value="四川省">

                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label fs-3">城市名称</label>
                    <input type="text" class="form-control" id="city_name" placeholder="请输入城市名称" autocomplete="off"
                        value="成都市">

                </div>

                <button type="submit" class="btn btn-primary " id="query_btn">查询</button>
            </form>
        </div>

        <div class="result_container">
            <ul>
                <!-- <li>东城区</li>
                <li>西城区</li>
                <li>海淀区</li>
                <li>中南海</li>
                <li>东城区</li> -->
            </ul>

        </div>


    </div>


</body>
<script>
    let InputContainer = document.querySelector('.input_container');
    let QueryBtn = document.querySelector('#query_btn');
    let ProvinceName = document.querySelector('#province_name');
    let CityName = document.querySelector('#city_name');
    let ResultContainer = document.querySelector('.result_container');

    QueryBtn.addEventListener('click', (e) => {
        e.preventDefault();// 阻止默认的表单提交行为
        if (ProvinceName.value === '' || CityName.value === '') {
            alert('请输入省份名称和城市名称');
            return;
        }

        axios({
            method: 'get',
            url: 'http://hmajax.itheima.net/api/area',
            params: {
                pname: ProvinceName.value,
                cname: CityName.value,
            }
        }).then(res => {
            if (res.status === 200 && res.data.message != "请检查pname参数和省份名字, 以及cname参数和城市名字, 是否完全正确") {
                Swal.fire({ title: '查询成功', icon: 'success', showConfirmButton: false, timer: 1000 })
                console.log(res.data);

                let liList = res.data.list.map(item => `<li>${item}</li>`).join('');
                ResultContainer.children[0].style.border = '1px solid #000';
                ResultContainer.children[0].innerHTML = liList;

            }else{
                Swal.fire({ title: '查询失败', icon: 'error', showConfirmButton: false, timer: 1500 })
            }
        })
            .catch(err => {

                Swal.fire({ title: '查询失败', icon: 'error', showConfirmButton: false, timer: 1500 })
            })

    })



</script>

</html>
