<script>
    let MyContainer = document.querySelector('.my-container');

    MyContainer.children[0].addEventListener('click', () => {

                cname: '成都市',
            }
        }).then(res => {
            console.log(res);
        }).catch(error => {
            console.log(error);
        })
    })
    MyContainer.children[1].addEventListener('click', () => {
        myAixos({
            method: 'get',
            url: 'http://hmajax.itheima.net/api/province',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': '',
            },

        }).then(res => {
            console.log(res);
        }).catch(error => {
            console.log(error);
        })
    })
    MyContainer.children[2].addEventListener('click', () => {

        myAixos({
            method: 'post',
            url: 'http://hmajax.itheima.net/api/login',
            headers: {
                'Content-Type': 'application/json',
            },
            data: {
                username: 'lmliheng',

        }).then(res => {
            console.log(res);
        }).catch(error => {
            console.log(error);
        })
    })
    MyContainer.children[3].addEventListener('click', () => {
        myAixos({
            method: 'post',
            url: 'http://hmajax.itheima.net/api/register',
            headers: {
                'Content-Type': 'application/json',
            },
            data: {
                username: 'lmliheng',
                password: '123456'
            }
        }).then(res => {
            console.log(res);
        }).catch(error => {
            console.log(error);
        })
    })



    // 函数提升 xhr+promise实现的axios函数
    // method 无默认值get,headers和params可以不写
    function myAixos(config) {
        const promise = new Promise((resolve, reject) => {
            //xhr
            const xhr = new XMLHttpRequest();
            if (config.params) {
                config.url += '?' + new URLSearchParams(config.params).toString();
            }
            xhr.open(config.method, config.url);
            // 多个请求头
            for (let key in config.headers) {
                console.log(key, config.headers[key]);
                xhr.setRequestHeader(key, config.headers[key]);
            }
            // 请求体
            if (config.data) {
                xhr.send(JSON.stringify(config.data));
            } else {
                xhr.send();
            }

            xhr.addEventListener('load', () => {
                if (xhr.status === 200) {
                    resolve('reponseText:' + xhr.responseText);
                } else {
                    reject('reponseText:' + xhr.responseText);
                }
            })
        })
        return promise;
    }





    const myPromise = new Promise((resolve, reject) => {
        // console.log('兑现前的promise', myPromise);
        setTimeout(() => {
            resolve("foo");
        }, 300);
    })

    console.log('兑现后的promise', myPromise);
    //  或者 写 myPromise.then(handleFulfilledA, handleRejectedA)

    myPromise_1 = myPromise.then(res => { // new Promise
        console.log('myPromise成功', res);
//  新的promise==============
        return new Promise((resolve, reject) => {
            setTimeout(() => {
                resolve("bar");
            }, 300);
        }).then(res => {
            console.log('myPromise_1成功', res);
        }).catch(error => {
            console.log('myPromise_1失败', error);
        })
//==========================

    }).catch(error => {
        console.log('myPromise失败', error);
    })










</script>
