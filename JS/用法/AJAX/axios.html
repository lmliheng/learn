<!DOCTYPE html>
<html lang="en">
<!-- 接口文档 https://s.apifox.cn/apidoc/docs-site/1937884/api-49760219-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>axios</title>
    <link rel="stylesheet" href="lib/bootstrap.min.css">
    <script src="lib/bootstrap.min.js"></script>
    <script src="lib/axios.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<style>
    .my-container {
        width: 800px;
        height: 500px;
        margin: 50px auto;
        border: 1px solid #000;
    }

    .item {
        height: 80px;
        line-height: 80px;
        text-align: center;
        font-size: 16px;
        font-weight: bold;
        color: #000;
        background-color: #fff;

    }

    .item .btn1 {
        width: 150px;
        height: 50px;
        line-height: 30px;
        text-align: center;
        font-size: 16px;
        font-weight: bold;
        color: #ffffff;
        background-color: #d89393;
        border: none;
        cursor: pointer;
        border-radius: 20px;
        transition: all 0.5s ease-in-out;
    }

    .item .btn1:hover {
        background-color: #c87373;
    }

    .modal-body img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
    }
</style>

<body>

    <div class="my-container">
        <div class="container text-center">
            <div class="row">
                <div class="col item">
                    <button class="btn1">/api/test</button>
                </div>
                <div class="col item">
                    <button type="button" class="btn1" data-bs-toggle="modal"
                        data-bs-target="#staticBackdrop">/api/uploadimg</button>
                </div>
                <div class="col item">

                </div>
                <div class="col item">col</div>
            </div>
            <div class="row">
                <div class="col item">col</div>
                <div class="col item">col</div>
                <div class="col item">col</div>
                <div class="col item">col</div>
            </div>
        </div>





        <div class="modal fade modal-dialog modal-dialog-centered" id="staticBackdrop" data-bs-backdrop="static"
            data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="staticBackdropLabel">上传图片</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="file" name="file" id="file" accept="image/*">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                        <button type="button" class="btn btn-primary">上传</button>
                    </div>
                </div>
            </div>
        </div>


    </div>
</body>
<script src="lib/axios.js"></script>
<script>

    let file = null

    let row1 = document.querySelector('.container').children[0];
    let row2 = document.querySelector('.container').children[1];

    let modalContent = document.querySelector('.modal-content');

    row1.children[0].addEventListener('click', () => {
        axios({
            method: 'get',
            url: 'http://127.0.0.1:3001/api/test',
        }).then(res => {
            if (res.status === 200) {
                Swal.fire({ title: '请求成功', icon: 'success', showConfirmButton: false, timer: 1000 })
            }

        })
        console.log('点击了/api/test');
    })

    row1.children[1].addEventListener('click', () => {
        console.log('点击了/api/upload');
    })

    modalContent.children[1].children[0].addEventListener('change', (e) => {
        console.log(e.target.files[0]);
        file = e.target.files[0];

    })

    modalContent.children[2].children[1].addEventListener('click', () => {
        console.log('点击了上传');
        console.log(file);
        let fd = new FormData();
        fd.append('img', file);
        console.log(fd);

        
        axios({
            method: 'post',
            url: 'https://hmajax.itheima.net/api/uploadimg',
            data: fd,
        }).then(res => {
            if (res.status === 200 && res.data.message === '上传成功') {
                console.log(res.data);
                Swal.fire({ title: '上传成功', icon: 'success', showConfirmButton: false, timer: 1000 })
                modalContent.children[1].innerHTML = `<img src="${res.data.data.url}" alt="">`;
                // 关闭弹窗后，要清除图片的展示
            } else {
                Swal.fire({ title: '上传失败', icon: 'error', showConfirmButton: false, timer: 1500 })
            }
            console.log(res.data);
        }).catch(error => {
            console.log(error);
        })
    
        
    })


</script>


</html>
