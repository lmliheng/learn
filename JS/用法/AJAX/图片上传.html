<!DOCTYPE html>
<html lang="en">
<!-- 接口文档 https://s.apifox.cn/apidoc/docs-site/1937884/api-49760219-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片上传</title>
    <link rel="stylesheet" href="lib/bootstrap.min.css">
    <script src="lib/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .my-container {
        width: 800px;
        height: 500px;
        margin: 50px auto;
        border: 1px solid #000;
    }

    .result {
        width: 400px;
        height: 400px;
        margin: 0 auto;
        margin-top: 20px;
    }

    .result img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 10px;
    }
</style>

<body>
    <div class="my-container">
        <input type="file" name="" id="input_file">
        <div class="result"></div>
    </div>
</body>
<script src="lib/axios.js"></script>
<script>


    const inputFile = document.querySelector('#input_file');
    inputFile.addEventListener('change', (e) => {
        console.log(e.target.files[0]);
        const fd = new FormData();
        fd.append('img', e.target.files[0]);
        axios({
            method: 'post',
            url: 'http://127.0.0.1:3001/api/upload',
            data: fd
        }).then(res => {
            if (res.status === 200 && res.data.message === '上传成功') {
                console.log(res.data);
                Swal.fire({ title: '上传成功', icon: 'success', showConfirmButton: false, timer: 1000 })
                document.querySelector('.result').innerHTML = `<img src="${res.data.data.url}" alt="">`;
            } else {
                Swal.fire({ title: '上传失败', icon: 'error', showConfirmButton: false, timer: 1500 })
            }

        }).catch(error => {
            console.log(error);
        })


    })


</script>


</html>
