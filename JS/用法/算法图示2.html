<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算法图示</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    a {
        text-decoration: none;
    }

    li {
        list-style: none;
    }

    h1 {
        text-align: center;
        margin: 20px 0;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px auto;
        width: 800px;
        min-height: 500px;
        border: 5px dotted #da4f4f;
        box-sizing: border-box;
        padding: 20px;
    }

    .container input {
        margin-top: 20px;
        width: 400px;
        height: 40px;
        border-radius: 10px;
        padding: 5px 15px;
        box-sizing: border-box;
        border: 2px solid #ddd;
        font-size: 16px;
    }

    .container button {
        margin-left: 10px;
        margin-top: 20px;
        width: 80px;
        height: 50px;
        border-radius: 10px;
        padding: 5px;
        box-sizing: border-box;
        border: none;
        box-shadow: 4px 4px 10px 0px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease-in-out;
        font-size: 16px;
        font-weight: 400;
        cursor: pointer;
    }

    .container button:hover {
        background-color: #da4f4f;
        transform: translateY(-2px);
        color: #fff;
    }

    .container button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
        transform: none;
    }

    .input-result {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        margin-top: 30px;
        width: 90%;
        height: 300px;
        border: 1px solid #da4f4f;
        padding: 20px;
        box-sizing: border-box;
        gap: 10px;
    }

    .input-result .num {
        min-width: 50px;
        height: 30px;
        background-color: #3498db;
        border-radius: 5px 5px 0 0;
        margin: 5px;
        text-align: center;
        line-height: 30px;
        color: #fff;
        font-size: 18px;
        font-weight: bold;
        transition: all 0.5s ease;
        position: relative;
    }

    /* 比较中的元素 */
    .num.comparing {
        background-color: #e74c3c;
        transform: scale(1.1);
    }

    /* 已排序的元素 */
    .num.sorted {
        background-color: #2ecc71;
    }

    /* 正在交换的元素 */
    .num.swapping {
        background-color: #f39c12;
        animation: shake 0.3s ease-in-out;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }

    .array-btn {
        margin-top: 30px;
        width: 300px;
        height: 50px;
        box-sizing: border-box;
        display: flex;
        justify-content: space-around;
        align-items: center;
    }

    .info-panel {
        margin-top: 20px;
        padding: 15px;
        background-color: #f8f9fa;
        border-radius: 10px;
        width: 90%;
        text-align: center;
    }

    .step-info {
        font-size: 18px;
        color: #333;
        margin-bottom: 10px;
    }

    .progress-bar {
        width: 100%;
        height: 10px;
        background-color: #ddd;
        border-radius: 5px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background-color: #2ecc71;
        width: 0%;
        transition: width 0.3s ease;
    }

    .legend {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 15px;
        flex-wrap: wrap;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .legend-color {
        width: 20px;
        height: 20px;
        border-radius: 3px;
    }
</style>

<body>
    <h1>🫧 Bubble Sort 冒泡排序可视化</h1>
    <div class="container">
        <div>
            <input type="text" name="array" id="array" placeholder="请输入数组，如: 64,34,25,12,22,11,90">
            <button onclick="inputArray()">输入</button>
            <button onclick="startSort()" id="sortBtn">开始排序</button>
            <button onclick="resetArray()" id="resetBtn">重置</button>
        </div>
        
        <div class="input-result" id="result">
            <!-- 动态生成的数组元素 -->
        </div>
        
        <div class="info-panel">
            <div class="step-info" id="stepInfo">请输入数组并点击"开始排序"</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #3498db;"></div>
                <span>未排序</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #e74c3c;"></div>
                <span>正在比较</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #f39c12;"></div>
                <span>正在交换</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #2ecc71;"></div>
                <span>已排序</span>
            </div>
        </div>
        
        <div class="array-btn">
            <button onclick="prev()" id="prevBtn" disabled>⬅ 后退</button>
            <span id="stepCounter">步骤: 0 / 0</span>
            <button onclick="next()" id="nextBtn" disabled>前进 ➡</button>
        </div>
    </div>

    <script>
        // 存储排序过程的每一步
        let sortSteps = [];
        let currentStep = 0;
        let originalArray = [];
        let isSorting = false;

        // 输入数组
        function inputArray() {
            const input = document.querySelector("#array").value;
            if (!input.trim()) {
                alert("请输入有效的数组！");
                return;
            }
            
            originalArray = input.split(',').map(num => parseInt(num.trim()));
            
            if (originalArray.some(isNaN)) {
                alert("数组包含非数字！");
                return;
            }
            
            document.querySelector("#array").value = '';
            renderArray(originalArray);
            updateButtons(false, false, true);
            document.getElementById('stepInfo').textContent = '数组已输入，点击"开始排序"查看过程';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('stepCounter').textContent = '步骤: 0 / 0';
        }

        // 渲染数组
        function renderArray(arr, comparing = [], swapping = [], sorted = []) {
            const container = document.getElementById('result');
            container.innerHTML = '';
            
            const maxVal = Math.max(...arr);
            
            arr.forEach((num, index) => {
                const div = document.createElement('div');
                div.className = 'num';
                
                if (sorted.includes(index)) {
                    div.classList.add('sorted');
                } else if (swapping.includes(index)) {
                    div.classList.add('swapping');
                } else if (comparing.includes(index)) {
                    div.classList.add('comparing');
                }
                
                div.textContent = num;
                
                // 根据数值设置高度
                const heightRatio = num / maxVal;
                div.style.height = (heightRatio * 150 + 30) + 'px';
                
                container.appendChild(div);
            });
        }

        // 生成冒泡排序的步骤
        function generateBubbleSortSteps(arr) {
            const steps = [];
            const n = arr.length;
            let tempArr = [...arr];
            let sortedIndices = [];
            
            // 初始状态
            steps.push({
                array: [...tempArr],
                comparing: [],
                swapping: [],
                sorted: [],
                info: '初始数组'
            });
            
            for (let i = 0; i < n - 1; i++) {
                for (let j = 0; j < n - 1 - i; j++) {
                    // 比较步骤
                    steps.push({
                        array: [...tempArr],
                        comparing: [j, j + 1],
                        swapping: [],
                        sorted: sortedIndices,
                        info: `比较 ${tempArr[j]} 和 ${tempArr[j + 1]}`
                    });
                    
                    if (tempArr[j] > tempArr[j + 1]) {
                        // 交换步骤
                        [tempArr[j], tempArr[j + 1]] = [tempArr[j + 1], tempArr[j]];
                        steps.push({
                            array: [...tempArr],
                            comparing: [],
                            swapping: [j, j + 1],
                            sorted: sortedIndices,
                            info: `交换位置：${tempArr[j + 1]} ↔ ${tempArr[j]}`
                        });
                    }
                }
                sortedIndices.push(n - 1 - i);
                
                // 每轮结束
                steps.push({
                    array: [...tempArr],
                    comparing: [],
                    swapping: [],
                    sorted: sortedIndices,
                    info: `第 ${i + 1} 轮完成，${tempArr[n - 1 - i]} 已就位`
                });
            }
            
            sortedIndices.push(0);
            steps.push({
                array: [...tempArr],
                comparing: [],
                swapping: [],
                sorted: sortedIndices,
                info: '排序完成！🎉'
            });
            
            return steps;
        }

        // 开始排序
        function startSort() {
            if (originalArray.length === 0) {
                alert("请先输入数组！");
                return;
            }
            
            sortSteps = generateBubbleSortSteps([...originalArray]);
            currentStep = 0;
            isSorting = true;
            
            showStep(currentStep);
            updateButtons(true, false, false);
        }

        // 显示指定步骤
        function showStep(stepIndex) {
            if (stepIndex < 0 || stepIndex >= sortSteps.length) return;
            
            const step = sortSteps[stepIndex];
            renderArray(step.array, step.comparing, step.swapping, step.sorted);
            
            document.getElementById('stepInfo').textContent = `步骤 ${stepIndex + 1}: ${step.info}`;
            document.getElementById('stepCounter').textContent = `步骤: ${stepIndex + 1} / ${sortSteps.length}`;
            
            const progress = ((stepIndex + 1) / sortSteps.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // 更新按钮状态
            document.getElementById('prevBtn').disabled = stepIndex === 0;
            document.getElementById('nextBtn').disabled = stepIndex === sortSteps.length - 1;
        }

        // 前进
        function next() {
            if (currentStep < sortSteps.length - 1) {
                currentStep++;
                showStep(currentStep);
            }
        }

        // 后退
        function prev() {
            if (currentStep > 0) {
                currentStep--;
                showStep(currentStep);
            }
        }

        // 重置
        function resetArray() {
            sortSteps = [];
            currentStep = 0;
            isSorting = false;
            renderArray(originalArray);
            updateButtons(false, false, originalArray.length > 0);
            document.getElementById('stepInfo').textContent = '数组已重置';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('stepCounter').textContent = '步骤: 0 / 0';
        }

        // 更新按钮状态
        function updateButtons(prevEnabled, nextEnabled, sortEnabled) {
            document.getElementById('prevBtn').disabled = !prevEnabled;
            document.getElementById('nextBtn').disabled = !nextEnabled;
            document.getElementById('sortBtn').disabled = !sortEnabled;
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prev();
            } else if (e.key === 'ArrowRight') {
                next();
            }
        });
    </script>
</body>
</html>
