<script>
    let array = [18, 2, 3, 4, 10, 6, 7, 8, 91, 10]
    let max = array[0];
    let min = array[0];
    for (let i = 0; i < array.length; i++) {
        max < array[i] ? max = array[i] : max;
        min > array[i] ? min = array[i] : min;
    }
    console.log("数组最大值为：" + max, "最小值为：" + min);


    // bubble_sort
    for (let i = 0; i < array.length; i++) {
        let flag = false;//设置标志位
        for (let j = 0; j < array.length - i - 1; j++) {
            if (array[j] > array[j + 1]) {
                let temp = array[j];
                array[j] = array[j + 1];
                array[j + 1] = temp;
                flag = true;//设置标志位
            }
        }
        if (!flag) {
            break;//如果标志位为false，说明没有交换，已经有序
        }
    }
    console.log(array);

    // 优化:1.设置标志位，如果内循环没有交换，说明已经有序，直接跳出循环
    //     2. 内循环的次数可以减少，因为每次交换后，最大的数就会放到最后面，所以内循环的次数可以减少


    //数组增删改查

    //增
    array.push(100); //将100添加到数组的末尾，返回数组的长度
    console.log(array.length);
    console.log(array);
    console.log('====================');
    array.unshift(100);//将100添加到数组的开头，返回数组的长度
    console.log(array.length);
    console.log(array);
    console.log('====================');

    //删

    console.log(array.pop());// 删除数组的最后一个元素，返回删除的元素
    console.log(array);
    console.log('====================');
    console.log(array.shift());// 删除数组的第一个元素，返回删除的元素
    console.log(array);
    console.log('====================');
    console.log(array.splice(2, 2));// 删除从第3个元素开始包括第3个元素的2个元素，返回删除的元素
    console.log(array);
    console.log('====================');
    //改
    array[0] = 1000;
    console.log(array);
    console.log('====================');
    //查
    console.log(array[0]);
    // 排序
    console.log(array.sort((a, b) => a - b));// 升序排序
    console.log('====================');
    console.log(array.sort((a, b) => b - a));// 降序排序
    //合并
    console.log(array.concat([1000, 2000, 3000]));
    console.log('====================');

    // 随机取一个数组中的元素
    for (let i = 0; i < 10; i++) {
        console.log('随机取一个数组中的元素是:', array[Math.floor(Math.random() * array.length)]);
    }

    // 对象
    let user = {
        name: '张三',
        age: 18,
        sex: '男',
        phone: '13800000000',
        hello: function () {
            console.log('hello world');
        }


    };


    console.log(user);
    console.log(JSON.stringify(user),'类型是',typeof JSON.stringify(user));
        console.log(JSON.stringify(user).toString());
    console.log('******************************');
    //增
    user.email = 'zhangsan@qq.com';
    console.log(user);
    console.log('====================');
    //删
    delete user.phone;
    console.log(user);
    console.log('====================');
    //改
    user.age = 20;
    console.log(user);
    console.log('====================');
    //查
    console.log(user.name);
    console.log(user['name']);
    user.hello();
    console.log('====================');

    // 赋的是对象的引用地址，不是对象的值
    let user2 = user;
    user2.name = '李四';
    console.log(user);// user.name='李四'
    console.log('====================');
    console.log(user2);
    console.log('====================');
    // for in 数组
    for (let key in array) {
        console.log('数组第', +key, '个值是', array[key]);
    }
    // for in 对象
    for (let key in user) {
        console.log(key, user[key]);
        // 用obj[key] 是将key[string]转换为属性的值，obj.key不行
    }

        },

        {

            email: 'wangwu@qq.com'
        }
    ];
    console.log(userData, typeof userData);
    console.log('====================');



    // 数组解构

    array1 = [1, 2, 3, 4, 5, 6];
    // a b c为number，
    let [a, b, c] = array1; // [1,2,3]
    let [d, e, f] = array1.slice(3, 6); // [4,5,6]
    let [g, h, i, j, k, l, m] = array1; // [1,2,3,4,5,6,undefined]
    console.log([a, b, c]);
    console.log([d, e, f]);
    console.log([g, h, i, j, k, l, m]);

    console.log('====================');
    // 对象解构

    object1 = {
        name: '张三',
        age: 18,
        sex: '男',
        phone: '13800000000',
        email: 'zhangsan@qq.com'
    };
    let { name, sex, phone, email } = object1;
    console.log(name, sex, phone, email);

    console.log('====================');




</script>
