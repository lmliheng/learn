<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发现</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: #f7f7f7;
            color: #333;
            max-width: 100vw;
            overflow-x: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background-color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid #e5e5e5;
        }

        .header-title {
            font-size: 18px;
            font-weight: 500;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icon {
            width: 20px;
            height: 20px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .discover-list {
            margin-top: 44px;
            margin-bottom: 56px;
        }

        .discover-section {
            background-color: #fff;
            margin-bottom: 10px;
        }

        .discover-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .discover-item:active {
            background-color: #f0f0f0;
        }

        .discover-item:last-child {
            border-bottom: none;
        }

        .discover-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            flex-shrink: 0;
        }

        .discover-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-width: 0;
        }

        .discover-name {
            font-size: 16px;
            color: #000;
        }

        .discover-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background-color: #fa5151;
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        .discover-avatar {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background-color: #e0e0e0;
        }

        .discover-text {
            font-size: 13px;
            color: #aaa;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .discover-arrow {
            width: 16px;
            height: 16px;
            opacity: 0.5;
            flex-shrink: 0;
        }

        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background-color: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e5e5e5;
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            flex: 1;
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .tab-text {
            font-size: 11px;
            color: #999;
        }

        .tab-item.active .tab-text {
            color: #07c160;
        }
    </style>
</head>

<body>

    <script>
        const tabs = document.querySelectorAll('.tab-item');
        const pages = ['1.html', '2.html', '3.html', '4.html'];

        tabs.forEach((tab, index) => {
            tab.addEventListener('click', function () {
                tabs.forEach(t => {
                    t.classList.remove('active');
                    const icon = t.querySelector('.tab-icon');
                    icon.style.backgroundImage = icon.style.backgroundImage.replace(/%2307c160/g, '%23999');
                });

                this.classList.add('active');
                const activeIcon = this.querySelector('.tab-icon');
                activeIcon.style.backgroundImage = activeIcon.style.backgroundImage.replace(/%23999/g, '%2307c160');

                if (index !== 2) {
                    window.location.href = pages[index];
                }
            });
        });

        function openFeature(name) {
            alert('打开 ' + name);
        }
    </script>
