<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: #f7f7f7;
            color: #333;
            max-width: 100vw;
            overflow-x: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background-color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid #e5e5e5;
        }

        .header-title {
            font-size: 18px;
            font-weight: 500;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icon {
            width: 20px;
            height: 20px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .user-info {
            margin-top: 44px;
            background-color: #fff;
            padding: 20px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user-details {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .user-id {
            font-size: 14px;
            color: #666;
        }

        .qr-code {
            width: 20px;
            height: 20px;
            opacity: 0.5;
            flex-shrink: 0;
        }

        .services {
            background-color: #fff;
            margin-bottom: 10px;
        }

        .service-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .service-item:active {
            background-color: #f0f0f0;
        }

        .service-item:last-child {
            border-bottom: none;
        }

        .service-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            flex-shrink: 0;
        }

        .service-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-width: 0;
        }

        .service-name {
            font-size: 16px;
            color: #000;
        }

        .service-value {
            font-size: 13px;
            color: #aaa;
            margin-right: 10px;
        }

        .service-arrow {
            width: 16px;
            height: 16px;
            opacity: 0.5;
            flex-shrink: 0;
        }

        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background-color: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e5e5e5;
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            flex: 1;
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .tab-text {
            font-size: 11px;
            color: #999;
        }

        .tab-item.active .tab-text {
            color: #07c160;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-title">我</div>
        <div class="header-icons">
            <div class="header-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23000&quot; d=&quot;M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z&quot;/></svg>');">
            </div>
        </div>
    </div>

    <div class="user-info" onclick="openProfile()">
        <div class="user-avatar">李</div>
        <div class="user-details">
            <div class="user-name">Li Heng</div>
            <div class="user-id">微信号: liheng_123</div>
        </div>
        <img class="qr-code"
            src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M1 1h8v8H1V1zm2 2v4h4V3H3zM1 15h8v8H1v-8zm2 2v4h4v-4H3zM15 1h8v8h-8V1zm2 2v4h4V3h-4zm-2 12h8v8h-8v-8zm2 2v4h4v-4h-4z'/></svg>">
    </div>

    <div class="services">
        <div class="service-item" onclick="openService('服务')">
            <div class="service-icon" style="background-color: #4caf50;">服</div>
            <div class="service-content">
                <div class="service-name">服务</div>
                <img class="service-arrow"
                    src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z'/></svg>">
            </div>
        </div>
    </div>

    <div class="services">
        <div class="service-item" onclick="openService('收藏')">
            <div class="service-icon" style="background-color: #ff9800;">收</div>
            <div class="service-content">
                <div class="service-name">收藏</div>
                <img class="service-arrow"
                    src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z'/></svg>">
            </div>
        </div>

        <div class="service-item" onclick="openService('朋友圈')">
            <div class="service-icon" style="background-color: #2196f3;">朋</div>
            <div class="service-content">
                <div class="service-name">朋友圈</div>
                <img class="service-arrow"
                    src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z'/></svg>">
            </div>
        </div>

        <div class="service-item" onclick="openService('视频号')">
            <div class="service-icon" style="background-color: #9c27b0;">视</div>
            <div class="service-content">
                <div class="service-name">视频号</div>
                <img class="service-arrow"
                    src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z'/></svg>">
            </div>
        </div>

        <div class="service-item" onclick="openService('卡包')">
            <div class="service-icon" style="background-color: #f44336;">卡</div>
            <div class="service-content">
                <div class="service-name">卡包</div>
                <img class="service-arrow"
                    src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z'/></svg>">
            </div>
        </div>

        <div class="service-item" onclick="openService('表情')">
            <div class="service-icon" style="background-color: #673ab7;">表</div>
            <div class="service-content">
                <div class="service-name">表情</div>
                <img class="service-arrow"
                    src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z'/></svg>">
            </div>
        </div>
    </div>

    <div class="services">
        <div class="service-item" onclick="openService('设置')">
            <div class="service-icon" style="background-color: #00bcd4;">设</div>
            <div class="service-content">
                <div class="service-name">设置</div>
                <img class="service-arrow"
                    src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z'/></svg>">
            </div>
        </div>

        <div class="service-item" onclick="openService('切换账号')">
            <div class="service-icon" style="background-color: #009688;">切</div>
            <div class="service-content">
                <div class="service-name">切换账号</div>
                <img class="service-arrow"
                    src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z'/></svg>">
            </div>
        </div>

        <div class="service-item" onclick="openService('退出')">
            <div class="service-icon" style="background-color: #795548;">退</div>
            <div class="service-content">
                <div class="service-name">退出</div>
                <div class="service-value">已登录</div>
                <img class="service-arrow"
                    src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23000' d='M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z'/></svg>">
            </div>
        </div>
    </div>

    <div class="tabbar">
        <div class="tab-item">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23999&quot; d=&quot;M12 3c-4.97 0-9 4.03-9 9v7c0 1.1.9 2 2 2h4v-8H5v-1c0-3.87 3.13-7 7-7s7 3.13 7 7v1h-4v8h4c1.1 0 2-.9 2-2v-7c0-4.97-4.03-9-9-9z&quot;/></svg>');">
            </div>
            <div class="tab-text">微信</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23999&quot; d=&quot;M19 3h4v2h-4v-2zm-7 2h2V3h-2v2zm-5 0h2V3H7v2zM3 5h2V3H3v2zm2 14H3v2h2v-2zm-2-2h2v-2H3v2zm2 2h2v-2H5v2zm2 2H5v2h2v-2zm-2-6h2v-2H3v2zm2 2h2v-2H5v2zm2 2-H5v2h2v-2zm2 2H7v2h2v-2zm2 2H9v2h2v-2zm2 2h-2v2h2v-2zm2 2h-2v2h2v-2zm2 0h2v2h-2v-2zm0 0h2v2h-2v-2zm0-16h2v2h-2V3zm-2 2h2V3h-2v2zm0 16h2v2h-2v-2z&quot;/></svg>');">
            </div>
            <div class="tab-text">通讯录</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;2&quot; fill=&quot;%23999&quot;/><circle cx=&quot;12&quot; cy=&quot;5&quot; r=&quot;2&quot; fill=&quot;%23999&quot;/><circle cx=&quot;12&quot; cy=&quot;19&quot; r=&quot;2&quot; fill=&quot;%23999&quot;/></svg>');">
            </div>
            <div class="tab-text">发现</div>
        </div>
        <div class="tab-item active">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%2307c160&quot; d=&quot;M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z&quot;/></svg>');">
            </div>
            <div class="tab-text">我</div>
        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab-item');
        const pages = ['1.html', '2.html', '3.html', '4.html'];

        tabs.forEach((tab, index) => {
            tab.addEventListener('click', function () {
                tabs.forEach(t => {
                    t.classList.remove('active');
                    const icon = t.querySelector('.tab-icon');
                    icon.style.backgroundImage = icon.style.backgroundImage.replace(/%2307c160/g, '%23999');
                });

                this.classList.add('active');
                const activeIcon = this.querySelector('.tab-icon');
                activeIcon.style.backgroundImage = activeIcon.style.backgroundImage.replace(/%23999/g, '%2307c160');

                if (index !== 3) {
                    window.location.href = pages[index];
                }
            });
        });

        function openProfile() {
            alert('打开个人资料');
        }

        function openService(name) {
            alert('打开 ' + name);
        }
    </script>
</body>

</html>
