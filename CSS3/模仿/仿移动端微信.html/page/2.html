<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>通讯录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: #f7f7f7;
            color: #333;
            max-width: 100vw;
            overflow-x: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background-color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid #e5e5e5;
        }

        .header-title {
            font-size: 18px;
            font-weight: 500;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icon {
            width: 20px;
            height: 20px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .contacts-list {
            margin-top: 44px;
            margin-bottom: 56px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background-color: #fff;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .contact-item:active {
            background-color: #f0f0f0;
        }

        .contact-icon {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background-color: #eee;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            flex-shrink: 0;
        }

        .contact-name {
            font-size: 16px;
            color: #000;
        }

        .group-title {
            padding: 8px 16px;
            background-color: #f7f7f7;
            font-size: 13px;
            color: #999;
            border-bottom: 1px solid #e5e5e5;
        }

        .letter-index {
            position: fixed;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .letter-item {
            font-size: 11px;
            color: #666;
            text-align: center;
            cursor: pointer;
            width: 15px;
        }

        .letter-item:active {
            color: #07c160;
        }

        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background-color: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e5e5e5;
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            flex: 1;
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .tab-text {
            font-size: 11px;
            color: #999;
        }

        .tab-item.active .tab-text {
            color: #07c160;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-title">通讯录</div>
        <div class="header-icons">
            <div class="header-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23000&quot; d=&quot;M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z&quot;/></svg>');">
            </div>
            <div class="header-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23000&quot; d=&quot;M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z&quot;/></svg>');">
            </div>
        </div>
    </div>

    <div class="contacts-list">
        <div class="contact-item" onclick="openContact('新的朋友')">
            <div class="contact-icon" style="background-color: #4caf50;">+</div>
            <div class="contact-name">新的朋友</div>
        </div>

        <div class="contact-item" onclick="openContact('仅聊天的朋友')">
            <div class="contact-icon" style="background-color: #ff9800;">仅</div>
            <div class="contact-name">仅聊天的朋友</div>
        </div>

        <div class="contact-item" onclick="openContact('群聊')">
            <div class="contact-icon" style="background-color: #2196f3;">群</div>
            <div class="contact-name">群聊</div>
        </div>

        <div class="contact-item" onclick="openContact('标签')">
            <div class="contact-icon" style="background-color: #9c27b0;">标</div>
            <div class="contact-name">标签</div>
        </div>

        <div class="contact-item" onclick="openContact('公众号')">
            <div class="contact-icon" style="background-color: #f44336;">公</div>
            <div class="contact-name">公众号</div>
        </div>

        <div class="contact-item" onclick="openContact('服务号')">
            <div class="contact-icon" style="background-color: #673ab7;">服</div>
            <div class="contact-name">服务号</div>
        </div>

        <div class="group-title">我的企业及企业联系人</div>

        <div class="contact-item" onclick="openContact('企业微信联系人')">
            <div class="contact-icon" style="background-color: #00bcd4;">企</div>
            <div class="contact-name">企业微信联系人</div>
        </div>

        <div class="contact-item" onclick="openContact('企业微信通知')">
            <div class="contact-icon" style="background-color: #009688;">通</div>
            <div class="contact-name">企业微信通知</div>
        </div>

        <div class="contact-item" onclick="openContact('中南大学ITS')">
            <div class="contact-icon" style="background-color: #795548;">中</div>
            <div class="contact-name">中南大学ITS</div>
        </div>

        <div class="group-title">A</div>

        <div class="contact-item" onclick="openContact('A01领峰家教-尹老师')">
            <div class="contact-icon" style="background-color: #607d8b;">A</div>
            <div class="contact-name">A01领峰家教-尹老师</div>
        </div>

        <div class="group-title">B</div>

        <div class="contact-item" onclick="openContact('爸爸')">
            <div class="contact-icon" style="background-color: #607d8b;">爸</div>
            <div class="contact-name">爸爸</div>
        </div>

        <div class="contact-item" onclick="openContact('班长')">
            <div class="contact-icon" style="background-color: #607d8b;">班</div>
            <div class="contact-name">班长</div>
        </div>
    </div>

    <div class="letter-index">
        <div class="letter-item">↑</div>
        <div class="letter-item">★</div>
        <div class="letter-item">A</div>
        <div class="letter-item">B</div>
        <div class="letter-item">C</div>
        <div class="letter-item">D</div>
        <div class="letter-item">E</div>
        <div class="letter-item">F</div>
        <div class="letter-item">G</div>
        <div class="letter-item">H</div>
        <div class="letter-item">I</div>
        <div class="letter-item">J</div>
        <div class="letter-item">K</div>
        <div class="letter-item">L</div>
        <div class="letter-item">M</div>
        <div class="letter-item">N</div>
        <div class="letter-item">O</div>
        <div class="letter-item">P</div>
        <div class="letter-item">Q</div>
        <div class="letter-item">R</div>
        <div class="letter-item">S</div>
        <div class="letter-item">T</div>
        <div class="letter-item">U</div>
        <div class="letter-item">V</div>
        <div class="letter-item">W</div>
        <div class="letter-item">X</div>
        <div class="letter-item">Y</div>
        <div class="letter-item">Z</div>
        <div class="letter-item">#</div>
    </div>

    <div class="tabbar">
        <div class="tab-item">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23999&quot; d=&quot;M12 3c-4.97 0-9 4.03-9 9v7c0 1.1.9 2 2 2h4v-8H5v-1c0-3.87 3.13-7 7-7s7 3.13 7 7v1h-4v8h4c1.1 0 2-.9 2-2v-7c0-4.97-4.03-9-9-9z&quot;/></svg>');">
            </div>
            <div class="tab-text">微信</div>
        </div>
        <div class="tab-item active">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%2307c160&quot; d=&quot;M19 3h4v2h-4v-2zm-7 2h2V3h-2v2zm-5 0h2V3H7v2zM3 5h2V3H3v2zm2 14H3v2h2v-2zm-2-2h2v-2H3v2zm2 2h2v-2H5v2zm2 2H5v2h2v-2zm-2-6h2v-2H3v2zm2 2h2v-2H5v2zm2 2-H5v2h2v-2zm2 2H7v2h2v-2zm2 2H9v2h2v-2zm2 2h-2v2h2v-2zm2 2h-2v2h2v-2zm2 0h2v2h-2v-2zm0 0h2v2h-2v-2zm0-16h2v2h-2V3zm-2 2h2V3h-2v2zm0 16h2v2h-2v-2z&quot;/></svg>');">
            </div>
            <div class="tab-text">通讯录</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;2&quot; fill=&quot;%23999&quot;/><circle cx=&quot;12&quot; cy=&quot;5&quot; r=&quot;2&quot; fill=&quot;%23999&quot;/><circle cx=&quot;12&quot; cy=&quot;19&quot; r=&quot;2&quot; fill=&quot;%23999&quot;/></svg>');">
            </div>
            <div class="tab-text">发现</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23999&quot; d=&quot;M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z&quot;/></svg>');">
            </div>
            <div class="tab-text">我</div>
        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab-item');
        const pages = ['1.html', '2.html', '3.html', '4.html'];

        tabs.forEach((tab, index) => {
            tab.addEventListener('click', function () {
                tabs.forEach(t => {
                    t.classList.remove('active');
                    const icon = t.querySelector('.tab-icon');
                    icon.style.backgroundImage = icon.style.backgroundImage.replace(/%2307c160/g, '%23999');
                });

                this.classList.add('active');
                const activeIcon = this.querySelector('.tab-icon');
                activeIcon.style.backgroundImage = activeIcon.style.backgroundImage.replace(/%23999/g, '%2307c160');

                if (index !== 1) {
                    window.location.href = pages[index];
                }
            });
        });

        function openContact(name) {
            alert('打开 ' + name + ' 的联系人详情');
        }

        document.querySelectorAll('.letter-item').forEach(item => {
            item.addEventListener('click', function () {
                const letter = this.textContent;
                if (letter === '↑') {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else if (letter === '★') {
                    alert('跳转到星标朋友');
                } else {
                    alert('跳转到字母 ' + letter);
                }
            });
        });

        document.querySelectorAll('.header-icon')[0].addEventListener('click', function () {
            alert('搜索联系人');
        });

        document.querySelectorAll('.header-icon')[1].addEventListener('click', function () {
            alert('添加朋友');
        });
    </script>
</body>

</html>
