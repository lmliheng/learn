<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微信</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: #f7f7f7;
            color: #333;
            max-width: 100vw;
            overflow-x: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background-color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid #e5e5e5;
        }

        .header-title {
            font-size: 18px;
            font-weight: 500;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icon {
            width: 20px;
            height: 20px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .login-status {
            margin-top: 44px;
            background-color: #fff;
            padding: 8px 16px;
            font-size: 13px;
            color: #666;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
        }

        .login-status::before {
            content: "";
            display: inline-block;
            width: 16px;
            height: 16px;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%2300c700" d="M20 18c1.1 0 1.99-.9 1.99-2L22 6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>');
            background-size: contain;
            margin-right: 6px;
        }

        .main-content {
            margin-bottom: 56px;
            margin-top: 5px;
        }

        .chat-list {
            margin-top: 5px;
        }

        .chat-item {
            display: flex;
            padding: 12px 16px;
            background-color: #fff;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .chat-item:active {
            background-color: #f0f0f0;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            background-color: #eee;
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name-time {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 500;
            color: #000;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 60%;
        }

        .chat-time {
            font-size: 12px;
            color: #aaa;
        }

        .chat-lastmsg {
            font-size: 13px;
            color: #888;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background-color: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e5e5e5;
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            flex: 1;
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .tab-text {
            font-size: 11px;
            color: #999;
        }

        .tab-item.active .tab-text {
            color: #07c160;
        }

        .tab-item {
            position: relative;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-title">微信</div>
        <div class="header-icons">
            <div class="header-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23000&quot; d=&quot;M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z&quot;/></svg>');">
            </div>
            <div class="header-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23000&quot; d=&quot;M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z&quot;/></svg>');">
            </div>
        </div>
    </div>

    <div class="login-status">Windows 微信已登录</div>

    <div class="main-content">
        <div class="chat-list">
            <div class="chat-item" onclick="openChat('文件传输助手')">
                <div class="chat-avatar" style="background-color: #4caf50;">文</div>
                <div class="chat-info">
                    <div class="chat-name-time">
                        <div class="chat-name">文件传输助手</div>
                        <div class="chat-time">下午5:58</div>
                    </div>
                    <div class="chat-lastmsg">[图片]</div>
                </div>
            </div>

            <div class="chat-item" onclick="openChat('毛笔书法群')">
                <div class="chat-avatar" style="background-color: #ff9800;">毛</div>
                <div class="chat-info">
                    <div class="chat-name-time">
                        <div class="chat-name">毛笔书法 周四晚 D座117</div>
                        <div class="chat-time">下午1:50</div>
                    </div>
                    <div class="chat-lastmsg">应化2405: 好滴好滴</div>
                </div>
            </div>

            <div class="chat-item" onclick="openChat('前端训练营群')">
                <div class="chat-avatar" style="background-color: #2196f3;">前</div>
                <div class="chat-info">
                    <div class="chat-name-time">
                        <div class="chat-name">前端训练营会员群（二群）</div>
                        <div class="chat-time">下午1:01</div>
                    </div>
                    <div class="chat-lastmsg">"Typeof(刘嘿嘿)"与群里其他人都不是朋友关系...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="tabbar">
        <div class="tab-item active">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%2307c160&quot; d=&quot;M12 3c-4.97 0-9 4.03-9 9v7c0 1.1.9 2 2 2h4v-8H5v-1c0-3.87 3.13-7 7-7s7 3.13 7 7v1h-4v8h4c1.1 0 2-.9 2-2v-7c0-4.97-4.03-9-9-9z&quot;/></svg>');">
            </div>
            <div class="tab-text">微信</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23999&quot; d=&quot;M19 3h4v2h-4v-2zm-7 2h2V3h-2v2zm-5 0h2V3H7v2zM3 5h2V3H3v2zm2 14H3v2h2v-2zm-2-2h2v-2H3v2zm2 2h2v-2H5v2zm2 2H5v2h2v-2zm-2-6h2v-2H3v2zm2 2h2v-2H5v2zm2 2H5v2h2v-2zm2 2H7v2h2v-2zm2 2H9v2h2v-2zm2 2h-2v2h2v-2zm2 2h-2v2h2v-2zm2 0h2v2h-2v-2zm0 0h2v2h-2v-2zm0-16h2v2h-2V3zm-2 2h2V3h-2v2zm0 16h2v2h-2v-2z&quot;/></svg>');">
            </div>
            <div class="tab-text">通讯录</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;2&quot; fill=&quot;%23999&quot;/><circle cx=&quot;12&quot; cy=&quot;5&quot; r=&quot;2&quot; fill=&quot;%23999&quot;/><circle cx=&quot;12&quot; cy=&quot;19&quot; r=&quot;2&quot; fill=&quot;%23999&quot;/></svg>');">
            </div>
            <div class="tab-text">发现</div>
        </div>
        <div class="tab-item">
            <div class="tab-icon"
                style="background-image: url('data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; viewBox=&quot;0 0 24 24&quot;><path fill=&quot;%23999&quot; d=&quot;M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z&quot;/></svg>');">
            </div>
            <div class="tab-text">我</div>
        </div>
    </div>

    <script>
        const tabs = document.querySelectorAll('.tab-item');
        const pages = ['1.html', '2.html', '3.html', '4.html'];

        tabs.forEach((tab, index) => {
            tab.addEventListener('click', function () {
                tabs.forEach(t => {
                    t.classList.remove('active');
                    const icon = t.querySelector('.tab-icon');
                    icon.style.backgroundImage = icon.style.backgroundImage.replace(/%2307c160/g, '%23999');
                });

                this.classList.add('active');
                const activeIcon = this.querySelector('.tab-icon');
                activeIcon.style.backgroundImage = activeIcon.style.backgroundImage.replace(/%23999/g, '%2307c160');

                if (index !== 0) {
                    window.location.href = pages[index];
                }
            });
        });

        function openChat(name) {
            alert('进入 ' + name + ' 的聊天界面');
        }

        document.querySelectorAll('.header-icon')[0].addEventListener('click', function () {
            alert('搜索功能');
        });

        document.querySelectorAll('.header-icon')[1].addEventListener('click', function () {
            alert('添加好友/发起群聊');
        });
    </script>
</body>

</html>
