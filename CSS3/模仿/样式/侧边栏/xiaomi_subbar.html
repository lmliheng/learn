<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米商城侧边栏</title>
    <link rel="stylesheet" href="css/test.css">
    <link rel="stylesheet" href="../../../icon/iconfont.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        ul li {
            list-style: none;
        }

        a {
            text-decoration: none;
        }


        .subbar {
            width: 270px;
            height: 240px;
            background-color: rgb(0, 0, 0, 0.5);
            margin: 200px auto;
            padding-top: 20px;

        }


        .subbar ul li a {

            display: block;
            display: flex;
            
            /* width: 100%; */
            height: 40px;
            line-height: 40px;
            padding-left: 20px;

            color: #fff;
            font-size: 12px;
        }

        .subbar ul li a:hover {

            background-color: #ff6700;
        }

        .a-span-icon {
            font-size: 14px;
            /* 怎么让图标右移到a的右侧 */
            /* margin-right: 10px; */
        }


    </style>
</head>


<body>
    
    <div class="subbar">
        <ul>
            <li><a href="">手机  <span class="iconfont icon-dayuhao a-span-icon"></span></a></li>
            <li><a href="">电视</a></li>
            <li><a href="">家电</a></li>
            <li><a href="">笔记本 平板 显示器</a></li>
            <li><a href="">出行 穿戴</a></li>
            <li><a href="">耳机 音箱</a></li>
        </ul>
    </div>

</body>

</html>
