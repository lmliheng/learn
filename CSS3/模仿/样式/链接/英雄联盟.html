<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英雄联盟</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    a {
        text-decoration: none;
    }

    .container {
        margin: 100px auto;
        width: 500px;
        height: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #aa3a9b;
        border: 1px solid #000;
    }

    .link_game {
        display: block;
        background-color: #333;
        color: #fff;
        width: 90px;
        height: 40px;
        line-height: 40px;
        text-align: center;

        transform: skewX(-16deg);

    }

    .link_game:hover {
        background-color: #fff;
        color: #540257;
    }
</style>

<body>
    <div class="container">
        <a class="link_game" href="">进入游戏</a>
    </div>
</body>

</html>
