<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片布局</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    p {
        text-align: center;
        font-size: 20px;
    }

    p:first-child {
        margin-top: 100px;
    }

    .box-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        max-width: 900px;
        height: 500px;
        margin: 100px auto;
        /* border: 1px solid #0c0909; */
        gap: 10px;
    }

    .box {
        width: 300px;
        height: 250px;
        overflow: hidden;
        /* 图片挡住了div的圆角 */
       
    }

    .box:hover img {
        transform: scale(1.05);
        width: 300px;
        height: 250px;
        overflow: hidden;
        /* 图片挡住了div的圆角 */
    }

    .box-grid .box-1 {
        grid-row: 1/3;
        height: 510px;
        border-radius: 20px 0 0 20px;
        /* gap 问题导致 图片布局 有 20px 的差距 */
    }

    .box-grid .box-4 {
        grid-column: 2/4;
        width: 610px;
        border-radius: 0 0 20px 0;
    }

    .box-grid .box-3 {
        border-radius: 0 20px 0 0;
    }


    .box-grid .box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
         transition: all 0.5s ease-in-out;
    }
</style>

<body>
    <p>1.使用grid布局，注意布局的gap使得图片不对齐，调整了1，4图片宽高</p>
    <p>2. 使用transform scale 缩放图片，缩放了图片的大小 但是盒子的宽高没有改变</p>

    <div class="box-grid">
        <div class="box box-1"><img src="../../../image/4-1.webp" alt=""></div>
        <div class="box"><img src="../../../image/a4.png" alt=""></div>
        <div class="box box-3"><img src="../../../image/a5.png" alt=""></div>
        <div class="box box-4"><img src="../../../image/a1.png" alt=""></div>
    </div>

</body>

</html>
