<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nav-bilibili-1</title>
    <link rel="stylesheet" href="../../../icon/iconfont.css">
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }
    li {
        list-style: none;
    }
    a {
        text-decoration: none;
    }

    .nav{
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap:10px 5px;


        margin: 100px auto;
        width: 450px;
        height: 40px;
        /* border: 1px solid #000; */
    }

    .nav .item{
        font-size: 10px;
        text-align: center;
        line-height: 20px;
        /* border: 1px solid #000; */
        border-radius: 5px;
        background-color: #F6F7F8;
  
    }
       .nav .item:hover{
        font-size: 10px;
        text-align: center;
        line-height: 20px;
        /* border: 1px solid #000; */
        border-radius: 5px;
        background-color: rgb(0, 0, 0,0.05);
        box-shadow: 2px 2px 5px 0px rgb(0, 0, 0,0.5);
  
    }
</style>
<body>

    <div class="nav">
        <div class="item"> 番剧</div>
        <div class="item"> 国创</div>   
        <div class="item"> 电影</div>
        
        <div class="item"> 电视剧</div>
        <div class="item"> 综艺</div>
        <div class="item"> 纪录片</div>
        <div class="item"> 动画</div>
        <div class="item"> 游戏</div>
        <div class="item"> 鬼畜</div>
        <div class="item"> 音乐</div>
        <div class="item"> 舞蹈</div>
        <div class="item"> 影视</div>
        <div class="item"> 娱乐</div>
        <div class="item"> 知识</div>
        <div class="item"> 科技数码</div>
        <div class="item"> 资讯</div>
        <div class="item"> 美食</div>
        <div class="item"> 更多>></div>
        


    </div>
</body>

</html>
