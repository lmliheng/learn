<!DOCTYPE html>
<html>

<head>

    <title>nav-bilibili</title>
    <link rel="stylesheet" href="../../../icon/iconfont.css">
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    li {
        list-style: none;
    }

    a {
        text-decoration: none;
    }

    .nav {
        margin: 100px auto;
        width: 362px;
        background-color: rgb(0, 0, 0,0.1);
        border-radius: 10px;

    }

    .nav ul  {
        padding: 10px 0px 5px 10px;
        display: block;
        display: flex;
    }
    .nav ul li {
        margin-right: 15px;
    }

    .nav ul li img {
        width: 40px;
        border-radius: 50%;

    }
    .nav ul li a{
        display: flex;
        flex-direction: column;
        align-items: center;
        font-size: 13px;
        
    }

</style>
