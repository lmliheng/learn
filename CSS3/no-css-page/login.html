<!-- 登陆界面 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="image/小米.svg">
    <title>小米账号 - 登录</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: MiSans, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica Neue, Arial, Noto Sans, sans-serif, Apple Color Emoji, Segoe UI Emoji, Segoe UI Symbol, Noto Color Emoji;
        
    }
    /* 需要统一选中颜色 */
    p::selection {
        background: #FF6900;
        color: white;
    }

    li {
        list-style: none;

    }

    a {
        text-decoration: none;
    }

    body {
        display: flex;
        width: 100%;
        height: 100%;
    }

    .left {
        width: 375px;
        height: 100%;
        /* overflow: hidden; */
    }

    .left img {
        /* display: block;
        /* width: 375px; */
        width: 362px;
        height: 100%;

    }

    body .main {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 100%;
        height: 850px;

    }

    .main-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 80px;

    }

    .header-title {
        width: 200px;
        height: 80px;
        line-height: 80px;
        text-align: center;
        font-size: 26px;
        font-weight: 500;
        color: rgb(0, 0, 0, 0.8);
    }

    .header-title img {
        height: 37px;
        margin-right: 10px;
        vertical-align: middle;
        border-radius: 14px;
    }

    .header-nav {
        width: 400px;
        height: 80px;
        line-height: 80px;
        text-align: center;
    }

    .header-nav ul {
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        gap: 7px;
    }

    .header-nav ul li {
        font-size: 16px;
        font-weight: 500;
        color: rgb(0, 0, 0, 0.8);
    }

    .header-nav ul li a {
        color: #838383;
        font-size: 14px;
        font-weight: 400;
        height: 40px;
        line-height: 40px;

        text-decoration: none;
    }

    .header-nav ul li a:hover {
        color: #ff5c00;
        font-size: 14px;
        font-weight: 400;
        height: 40px;
        line-height: 40px;
        text-decoration: none;
    }


    .main-content {
        width: 380px;
        height: 560px;
        margin: 138px auto;
        /* border: 1px solid #e97a7a; */
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    }

    .content-form {
        padding: 30px;
    }

    .main-content .content-form .form-title {
        display: flex;
        gap: 20px;
    }

    .hr {
        position: absolute;
        top: 0px;
        left: 3px;
        height: 3px;
        border-radius: 2px;
        width: 39px;
        background-color: #ff5c00;

    }

    .main-content .content-form .form-title div:first-child {
        position: relative;

        font-size: 22px;
        font-weight: 500;
    }

    .main-content .content-form .form-title p:last-child {
        font-size: 22px;
        font-weight: 500;
        color: rgb(0, 0, 0, 0.2);
    }

    .main-content .content-form .form-content .form-item {
        margin: 20px auto;
    }

    .main-content .content-form .form-content .form-item input {

        width: 95%;
        height: 52px;
        border-radius: 8px;
        border: none;
        padding-left: 10px;
        background-color: #f5f5f5;

    }

    .main-content .content-form .form-content div {
        line-height: 52px;
        text-align: center;
    }

    .main-content .content-form .form-content div label {
        font-size: 12px;
        font-weight: 400;
        color: #838383;
    }

    .main-content .content-form .form-content button {
        width: 95%;
        height: 52px;
        border-radius: 8px;
        border: none;
        padding-left: 10px;
        background-color: #ff5c00;
        color: #fff;
        font-size: 16px;
        font-weight: 500;
    }

    .main-content .content-form .form-content .form-item-other {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 40px;
        color: #ff5c00;
    }

    .main-content .content-form .p-1 {
        font-size: 15px;
        color: #AAAAAA;
        text-align: center;

    }

    .main-content .content-form .login-way {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 40px;
        margin-top: 20px;
    }

    .main-content .content-form .login-way img {
        height: 30px;
        margin-right: 10px;
        vertical-align: middle;
        border-radius: 14px;
    }


    .main-footer {
        width: 100%;
        height: 20px;
        /* background-color: bisque; */
        /* border:1px solid #000; */
    }

    .main-footer p {
        text-align: center;
        color: #999;
        font-size: 12px;
    }

    .main-footer p a {
        color: #999;
        font-size: 12px;
        text-decoration: underline;
    }
</style>

<body>
    <div class="left"><img src="image/left.jpg" alt=""></div>
    <div class="main">
        <div class="main-header">
            <div class="header-title">
                <img src="image/小米.svg" alt="">
                <span>小米账号</span>
            </div>
            <div class="header-nav">

                <ul>
                    <li>
                        <a href="#">用户协议</a>
                    </li>
                    <li>
                        <a href="#">隐私政策</a>
                    </li>
                    <li>
                        <a href="#">帮助中心</a>
                    </li>

                    <li>
                        <a href="#">中文（简体）</a>
                    </li>


                </ul>
            </div>


        </div>
        <div class="main-content">
            <div class="content-form">
                <div class="form-title">
                    <div>
                        登录<div class="hr"></div>
                    </div>
                    <p>注册</p>
                </div>
                <div class="form-content">
                    <div class="form-item">

                        <input type="text" id="username" name="username" placeholder="邮箱/手机号码/小米ID">
                    </div>
                    <div class="form-item">
                        <input type="password" id="password" name="password" placeholder="密码">
                    </div>
                    <div>
                        <input type="checkbox" id="Agree" name="Agree">
                        <label for="Agree">已阅读并同意小米账号使用协议和小米账号隐私政策</label>

                    </div>

                    <button type="submit">登录</button>
                    <div class="form-item-other">
                        <p>忘记密码？</p>
                        <p>手机登录</p>
                    </div>

                </div>
                <div class="p-1">其他方式登录</div>

                <div class="login-way">
                    <img src="image/支付宝.svg" alt="">
                    <img src="image/微信.svg" alt="">
                    <img src="image/qq.svg" alt="">
                    <img src="image/微博.svg" alt="">

                </div>
            </div>


        </div>
        <div class="main-footer">
            <p>小米公司版权所有-京ICP备10046444-<a href="#">京公网安备11010802020134</a>号-京ICP证110507号</p>
        </div>



    </div>


</body>

</html>
