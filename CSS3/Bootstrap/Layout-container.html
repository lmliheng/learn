<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">


</head>
<style>
    .container-1 {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 20px;
        border: 5px dotted rgb(223, 84, 84);
        height: 500px;
    }


    .container-2 {
        margin-top: 20px;
        border: 1px solid rgb(223, 84, 84);
        height: 500px;
    }

    .container-fluid-1 {
        background-color: aquamarine;
        height: 100px;
    }

    .container-2 .row .item {
        border: 1px solid rgb(223, 84, 84);
        height: 100px;
    }
</style>

<body>
    <div class="container-fluid container-fluid-1"></div>

    <div class="container container-1">
        <img class="img-fluid" src="img/image.png" alt="">
        <!-- img-fluid 图片自适应 -->
    </div>

    <div class="container text-center container-2">
        <div class="row">
            <div class="col item">
                1 of 2
            </div>
            <div class="col item">
                2 of 2
            </div>
        </div>
        <div class="row">
            <div class="col item">
                1 of 3
            </div>
            <div class="col item">
                2 of 3
            </div>
            <div class="col item">
                3 of 3
            </div>
        </div>
    </div>


</body>
<script src="bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>

</html>
