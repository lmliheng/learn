<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Learner</title>
    <link rel="stylesheet" href="css/test.css">
    <style>
        /* 清除内外边距 */
        * {
            margin: 0;
            padding: 0;
        }

        .center {
            margin: 0 auto;
        }

        .header {
            height: 80px;
            background-color: rgb(0, 0, 0, 0.5); 
            /* 半透明 可在下面添加图片 */
        }

        .nav {
            height: 50px;
            width: 80%;
            background-color: rgb(46, 158, 111);
        }

        .main {
            height: 500px;
            width: 80%;
            background-color: rgb(171, 7, 70);
        }

        .footer {
            height: 100px;
            background-color: rgb(52, 50, 167);
        }
    </style>
</head>

<body>
    <!-- 
<header></header>
 <nav></nav>
 <main></main>
 <footer></footer>
  -->


    <div class="header"></div>
    <div class="nav center"></div>
    <div class="main center"></div>
    <div class="footer"></div>

</body>

</html>
