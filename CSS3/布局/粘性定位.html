<DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>粘性定位</title>
    </head>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .search-input {
            position: sticky;
            top: 0;

            margin: 100px auto;
            width: 200px;
            height: 40px;
            border: 1px solid #0c0909;
            border-radius: 20px;

        }

        .main {
            width: 70%;
            height: 1000px;
            background-color: rgba(0, 0, 0, 0.3);
            margin: 0 auto;
        }

        .main-1 {
            width: 70%;
            height: 1000px;
            background-color: rgba(0, 0, 0, 0.5);
            margin: 0 auto;
        }
    </style>


    <body>
        <div class="search-input"></div>

        <div class="main">
        </div>

        <div class="main-1">
        </div>

    </body>

    </html>
