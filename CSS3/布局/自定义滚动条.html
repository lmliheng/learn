<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义滚动条</title>

</head>
<style>
    * {
        margin: 0;
        padding: 0;
        overflow-x: hidden;

    }


    /* 滚动条设置宽高 */
    ::-webkit-scrollbar {
        width: 8px;

    }

    /* 滚动条轨道 */
    ::-webkit-scrollbar-track {
        background-color: #f5f5f5;
    }

    /* 滚动条滑块 */
    ::-webkit-scrollbar-thumb {
        background-color: #c22a2a;
        border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background-color: #5c1212;
    }

    .container {
        width: 100%;
        height: 2000px;
        /* background-color: #f5f5f5; */
        border: 1px solid #ccc;

    }
</style>

<body>


    <div class="container">

    </div>
</body>

</html>
