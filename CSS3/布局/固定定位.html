<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>固定定位</title>
    <style>
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background-color: #be2626;
            z-index: 999;
        }


        .main {
            width: 70%;
            height: 1000px;
            background-color: rgba(0, 0, 0, 0.3);
            margin: 0 auto;
        }

        .main-1 {
            width: 70%;
            height: 1000px;
            background-color: rgba(0, 0, 0, 0.5);
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div class="header">

    </div>

    <div class="main">
    </div>

    <div class="main-1">
    </div>
</body>

</html>
