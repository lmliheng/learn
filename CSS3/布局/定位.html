<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../模仿/iconfont/iconfont.css">
    <title>定位</title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
    }

    li {
        list-style: none;
    }

    h1 {
        margin-top: 200px;
        margin-bottom: 50px;
        text-align: center;

    }

    .container {

        position: relative;
        margin: 0 auto;
        width: 800px;
        height: 500px;
        border: 8px dotted rgb(223, 138, 138);

        text-align: center;
        line-height: 500px;
    }

    .container i {
        position: relative;
        font-size: 100px;
    }

    .num {
        position: absolute;
        top: 12px;
        right: 2px;
        background-color: rgb(245, 10, 10);
        width: 30px;
        height: 30px;
        border-radius: 50%;


    }

    .num span {
        position: absolute;
        top: 6px;
        left: 10px;
        font-size: 16px;
        color: #ffffff;
        line-height: 20px;
        text-align: center;
    }

    .container img {
        width: 100%;
        height: 100%;
    }

    .button-image-row {
        position: absolute;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        bottom: 20px;
        right: 20px;

        width: 200px;
        height: 50px;


    }

    .button-image-row .button-image {
        border-radius: 50%;
        width: 20px;
        height: 20px;
        background-color: rgba(255, 255, 255, 0.5);
    }

    .button-image-row .button-image:hover {
        border-radius: 50%;
        width: 20px;
        height: 20px;
        background-color: #ffffff;
        box-shadow: 0 0 10px 1px #ffffff;
    }

    .button-left {
        position: absolute;
        top: 50%;

        transform: translateY(-50%);
        width: 40px;
        height: 100px;
        background-color: rgba(255, 255, 255, 0.05);
    }

    .button-right {
        position: absolute;
        top: 50%;
        right: 0px;
        transform: translateY(-50%);
        width: 50px;
        height: 100px;
        background-color: rgba(255, 255, 255, 0.05);
    }

    .button-left i {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 50px;
        color: rgba(255, 255, 255, 0.2);
    }

    .button-right i {
        position: absolute;
        top: 50%;

        transform: translate(-50%, -50%);
        font-size: 50px;
        color: rgba(255, 255, 255, 0.2);
    }

    .button-left:hover {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 40px;
        height: 100px;
        background-color: rgba(255, 255, 255, 0.1);
    }

    .button-left i:hover {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 50px;
        color: rgba(255, 255, 255, 0.4);
    }


    .button-right:hover {
        position: absolute;
        top: 50%;
        right: 0px;
        transform: translateY(-50%);
        width: 50px;
        height: 100px;
        background-color: rgba(255, 255, 255, 0.1);
    }

    .button-right i:hover {
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        font-size: 50px;
        color: rgba(255, 255, 255, 0.4);
    }

    .image-row {
        display: flex;

        width: 760px;
        height: 400px;
        border: 8px dotted rgb(223, 138, 138);

        text-align: center;
        
        margin: 0 auto;
    }

        .image-row {
        display: flex;

        width: 760px;
        height: 400px;
        border: 8px dotted rgb(223, 138, 138);

        text-align: center;
        
        margin: 0 auto;
    }






    .image-row ul {

        display: flex;
        width: 100%;
        
        justify-content: space-between;
        align-items: center;
        gap: 20px;

        overflow-x: scroll;
    }

    .image-row ul li {
        /* overflow: hidden; */
        flex: 0 0 200px;
        
    }

    .image-row ul li img {
        width: 100%;
        height: 100%;
    }
</style>

<body>

    <h1>元素右上角提示定位，设置上限99+</h1>
    <div class="container">
        <i class="iconfont icon-cart-full">
            <div class="num"><span>2</span></div>
        </i>
    </div>

    <h1>轮播图小白点</h1>
    <div class="container">
        <img src="../image/a6.png" alt="">
        <div class="button-image-row">
            <div class="button-image"></div>
            <div class="button-image"></div>
            <div class="button-image"></div>

        </div>

    </div>

    <h1>轮播图左右切换按钮</h1>

    <div class="container">
        <img src="../image/a1.png" alt="">
        <div class="button-left">
            <i class="iconfont icon-arrow-left-bold"></i>
        </div>
        <div class="button-right">
            <i class="iconfont icon-arrow-right-bold"></i>
        </div>


    </div>


    <h1>轮播图溢出隐藏<h1>

            <div class="image-row">
                <ul>
                    <li>
                        <img src="../image/4-1.webp" alt="">
                    </li>

                    <li>
                        <img src="../image/4-6.webp" alt="">
                    </li>

                  
                    <li>
                        <img src="../image/4-1.webp" alt="">
                    </li>

                    <li>
                        <img src="../image/3-3.webp" alt="">
                    </li>
                    <li>
                        <img src="../image/3-5.webp" alt="">
                    </li>

                </ul>


            </div>

</body>

</html>
